      responses:
        "204":
          description: |
            🇩🇪 Leihangestellte erstellt oder aktualisiert.

            🇬🇧 Leased employees created or updated.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/NotAuthenticatedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableContentError"

  /v1/salary-declarations/{salaryDeclarationId}/leased-employees/{employeeNumber}:
    parameters:
