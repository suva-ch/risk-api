components:
  securitySchemes:
    ApiKeyAuth:
      description: |
        🇩🇪 Authentifizierung über Bearer-Token - siehe OAuth-Beispiele auf https://github.com/suva-ch/risk-api-demo-python/tree/main
        🇬🇧 Authentication via Bearer Token - see OAuth examples at https://github.com/suva-ch/risk-api-demo-python/tree/main
      type: http
      scheme: bearer

  parameters:
    EmployeeNumber:
      name: employeeNumber
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/EmployeeNumber"

    IscoSalaryNumber:
      name: iscoSalaryNumber
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/IscoSalaryNumber"

    MissionCompanyNumber:
      name: missionCompanyNumber
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/MissionCompanyNumber"

    MissionNumber:
      name: missionNumber
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/MissionNumber"

    SalaryDeclarationId:
      name: salaryDeclarationId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/SalaryDeclarationId"

    TemporaryWorkAgencyBranchNumber:
      name: temporaryWorkAgencyBranchNumber
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/TemporaryWorkAgencyBranchNumber"

    TemporaryWorkAgencyRegionNumber:
      name: temporaryWorkAgencyRegionNumber
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/TemporaryWorkAgencyRegionNumber"

    TemporaryWorkAgencyTeamNumber:
      name: temporaryWorkAgencyTeamNumber
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/TemporaryWorkAgencyTeamNumber"

    TemporaryWorkAgencyConsultantNumber:
      name: temporaryWorkAgencyConsultantNumber
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/TemporaryWorkAgencyConsultantNumber"

    # headers

    X-Client-Vendor:
      name: X-Client-Vendor
      in: header
      description: |
        🇩🇪 Name des Herstellers der Client-Anwendung.
        🇬🇧 Name of the vendor responsible for the client application.
      required: false
      schema:
        type: string

    X-Client-Name:
      name: X-Client-Name
      in: header
      description: |
        🇩🇪 Produkt-Name der Client-Anwendung.
        🇬🇧 Product name of the client application.
      required: false
      schema:
        type: string

    X-Client-Version:
      name: X-Client-Version
      in: header
      description: |
        🇩🇪 Version der Anwendung.
        🇬🇧 Version of the application.
      required: false
      schema:
        type: string

  requestBodies:
    UpdateSalaryDeclaration:
      description: |
        🇩🇪 FIXME
        🇬🇧 FIXME
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              comment:
                type: string
              messageType:
                $ref: "#/components/schemas/SalaryDeclarationType"
            required:
              - messageType
    
    SaveSalaryDeclaration:
      description: |
        🇩🇪 FIXME
        🇬🇧 FIXME
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              comment:
                type: string
              messageType:
                $ref: "#/components/schemas/SalaryDeclarationType"
              accountingPeriodFrom:
                type: string
                format: date
              accountingPeriodUntil:
                type: string
                format: date
              customerNumber:
                description: |
                  🇩🇪 Die Suva-Kundennummer
                  🇬🇧 Suva customer ID
                type: string
                example: "8-01747-90000"
                pattern: '^\d{1}-\d{5}-\d{5}$'
              subNumber:
                description: |
                  🇩🇪 Subnummer als 2-stellige Zahl.
                  🇬🇧 Subnumber as a 2-digit code.
                type: string
                example: "01"
                pattern: '^\d{2}$'
            required:
              - messageType
              - accountingPeriodFrom
              - accountingPeriodUntil
              - customerNumber
              - subNumber

    PatchSalaryDeclaration:
      description: |
        🇩🇪 FIXME
        🇬🇧 FIXME
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              operation:
                type: string
                enum:
                  [
                    transmit_with_completion,
                    transmit_without_completion,
                    reopen,
                  ]
            required:
              - operation

  responses:
    BadRequestError:
      description: |
        🇩🇪 Anfrage kann nicht verarbeitet werden.
        🇬🇧 Request cannot be processed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotAuthenticatedError:
      description: |
        🇩🇪 Keine gültigen Authentifizierungsdaten für die angeforderte Ressource vorhanden.
        🇬🇧 No valid authentication data available for the requested resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFoundError:
      description: |
        🇩🇪 Die angeforderte Resource konnte nicht gefunden werden.
        🇬🇧 The requested resource could not be found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    ConflictError:
      description: |
        🇩🇪 Die Anfrage konnte nicht verarbeitet werden, da es einen Konflikt mit dem aktuellen Zustand der Resource gibt.
        🇬🇧 The request could not be processed due to a conflict with the current state of the resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    UnprocessableContentError:
      description: |
        🇩🇪 Die Anfrage konnte nicht verarbeiten werden, da sie ungültige Daten enthält.
        🇬🇧 The request could not be processed because it contains invalid data.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    # FIXME Simple
    EmployeeNumber:
      description: |
        🇩🇪 Nummer des Angestellten (ERP-System)
        🇬🇧 FIXME
      type: string

    IscoSalaryNumber:
      description: |
        🇩🇪 Nummer des ISCO-Lohn (ERP-System)
        🇬🇧 FIXME
      type: string

    Language:
      description: |
        🇩🇪 Sprache
        🇬🇧 Language
      type: string
      enum: [de, fr, it, en]

    MissionCompanyNumber:
      description: |
        🇩🇪 Nummer des Einsatzbetrieb (ERP-System)
        🇬🇧 FIXME
      type: string

    MissionNumber:
      description: |
        🇩🇪 Nummer des Einsatz (ERP-System)
        🇬🇧 FIXME
      type: string

    SalaryDeclarationId:
      description: |
        🇩🇪 ID für eine Lohn- und Einsatzmeldung.
        🇬🇧 ID of an salary and mission declaration.
      type: string
      format: uuid

    SalaryDeclarationType:
      description: |
        🇩🇪 Meldungstyp: periodisch, Jahresmeldung definitiv, oder Jahresmeldung Ersatz
        🇬🇧
      type: string
      enum: [periodic, annual_definitive, annual_replacement]

    TemporaryWorkAgencyBranchNumber:
      description: |
        🇩🇪 Nummer des Personalverleiher Filiale (ERP-System)
        🇬🇧 FIXME
      type: string

    TemporaryWorkAgencyRegionNumber:
      description: |
        🇩🇪 Nummer des Personalverleiher Region (ERP-System)
        🇬🇧 FIXME
      type: string

    TemporaryWorkAgencyTeamNumber:
      description: |
        🇩🇪 Nummer des Personalverleiher Team (ERP-System)
        🇬🇧 FIXME
      type: string

    TemporaryWorkAgencyConsultantNumber:
      description: |
        🇩🇪 Nummer des Personalverleiher Berater (ERP-System)
        🇬🇧 FIXME
      type: string

    DeleteOmittedItems:
      description: |
        🇩🇪 Wenn `true`, werden die ausgelassenen Items aus der Liste gelöscht. Default-Wert ist `false`.
        🇬🇧 Whether the omitted items in the list should be deleted or left untouched. Defaults to `false`.
      type: boolean
      default: false

    LeasedEmployee:
      description: |
        🇩🇪 Leihangestellter
        🇬🇧 Leased employee
      allOf:
        - $ref: "#/components/schemas/Employee"

    # FIXME Complex
    Employee:
      description: |
        🇩🇪 Angestellter
        🇬🇧 Employee
      type: object
      properties:
        employeeNumber:
          $ref: "#/components/schemas/EmployeeNumber"
        firstName:
          description: |
            🇩🇪 Vorname
            🇬🇧 First name
          type: string
        lastName:
          description: |
            🇩🇪 Nachname
            🇬🇧 Last name
          type: string
        sex:
          description: |
            🇩🇪 Geschlecht
            🇬🇧 Gender
          type: string
          enum: [f, female, m, male]
        dateOfBirth:
          description: |
            🇩🇪 Geburtsdatum
            🇬🇧 Date of birth
          type: string
          format: date
        socialInsuranceIdentification:
          description: |
            🇩🇪 AHV-Nummer
            🇬🇧 Social insurance identification
          type: string
          pattern: '^\d{3}.\d{4}.\d{4}.\d{2}$'
          example: "756.1234.5678.90"
        socialInsuranceIdentificationUnknown:
          description: |
            🇩🇪 Wenn `true` ist die AHV-Nummer unbekannt.
            🇬🇧 If `true` social insurance identification is unknown.
          type: boolean
      required:
        - employeeNumber
        - lastName
        - firstName
        - sex
        - dateOfBirth

    Error:
      description: |
        🇩🇪 Fehlermeldung
        🇬🇧 Error message
      properties:
        message:
          description: |
            🇩🇪 Die in englischer Sprache gelieferte Fehlermeldung. Beispiel: 'Occupation code with id '00000000-0000-0000-0000-000000000000' not found'.
            🇬🇧 Error message provided in English. Example: 'Occupation code with id '00000000-0000-0000-0000-000000000000' not found'.
          type: string
        id:
          description: |
            🇩🇪 Eindeutige ID der Fehlermeldung. Beispiel: Zwei Fehlermeldungen 'Occupation code with id '00000000-0000-0000-0000-000000000000' not found' haben unterschiedliche ID's.
            🇬🇧 Unique ID of the error message. Example: Two error messages 'Occupation code with id '00000000-0000-0000-0000-000000000000' not found' have different IDs.
          type: string
        key:
          description: |
            🇩🇪 Key der Fehlermeldung. Beispiel: Zwei Fehlermeldungen 'Occupation code with id '00000000-0000-0000-0000-000000000000' not found' haben denselben Key.
            🇬🇧 Key of the error message. Example: Two error messages 'Occupation code with id '00000000-0000-0000-0000-000000000000' not found' have the same key.
          type: string
        args:
          description: |
            🇩🇪 Argumente für die Aufbereitung einer Fehlermeldung.
            🇬🇧 Arguments for formatting an error message.
          type: object
          additionalProperties:
            type: string
      required:
        - message
        - id
        - key

    LocalizedMessage:
      description: |
        🇩🇪 Ein sprachbezogener Wert.
        🇬🇧 A language-specific value.
      type: object
      properties:
        language:
          $ref: "#/components/schemas/Language"
        text:
          type: string
      required:
        - language
        - text

    Message:
      description: |
        🇩🇪 Rückmeldung der Suva-Validierungen zu den übermittelten Lohn- und Einsatzdaten.
        🇬🇧 Feedback from the Suva validations of the transmitted salary and mission data.
      type: object
      properties:
        id:
          description: |
            🇩🇪 Eindeutige ID der Rückmeldung.
            🇬🇧 Unique ID of the message.
          type: string
          format: uuid
        messageKey:
          description: |
            🇩🇪 Eindeutige ID der Validierung Rückmeldung (ID pro Art der Validierung).
            🇬🇧 Unique ID of the validation message (ID per validation type).
          type: string
        messageType:
          description: |
            🇩🇪 Art der Rückmeldung.
            🇬🇧 Type of the message.
          type: string
          enum: [warning, error]
        localizedMessages:
          description: |
            🇩🇪 Die Rückmeldung in verschiedenen Sprachen.
            🇬🇧 The message in different languages.
          type: array
          items:
            $ref: "#/components/schemas/LocalizedMessage"
        args:
          description:
            🇩🇪 Argumente für die Aufbereitung einer eigenen Rückmeldung.
            🇬🇧 Arguments for creating custom messages.
          type: object
          additionalProperties:
            type: string
      required:
        - id
        - key
        - messageType
        - localizedMessages
        - args

    Mission:
      description: |
        🇩🇪 Einsatz
        🇬🇧 Mission
      type: object
      properties:
        missionNumber:
          $ref: "#/components/schemas/MissionNumber"
        employeeNumber:
          $ref: "#/components/schemas/EmployeeNumber"
        missionCompanyNumber:
          $ref: "#/components/schemas/MissionCompanyNumber"
        periodFrom:
          description: |
            🇩🇪 Beginndatum der Einsatzperiode
            🇬🇧 FIXME
          type: string
          format: date
        periodUntil:
          description: |
            🇩🇪 Endedatum der Einsatzperiode
            🇬🇧 FIXME
          type: string
          format: date
        iscoOccupationTypeId:
          description: |
            🇩🇪 ISCO-Berufsart
            🇬🇧 ISCO occupation type
          type: string
          pattern: '^\d{5}$'
          example: "93130"
        occupationDescription:
          description: |
            🇩🇪 Individuelle Berufsbezeichnung des Personalverleihers
            🇬🇧 FIXME
          type: string
        contractualJobTitle:
          description: |
            🇩🇪 Spezifische Berufsbezeichnung des Personalverleihers für den Einsatz, falls abweichend vom individuellen Berufscode.
            🇬🇧 FIXME
          type: string
        kindOfWagePayment:
          description: |
            🇩🇪 Art der Lohnzahlung
            🇬🇧 FIXME
          type: string
          enum: [monthly, daily, hourly, lesson]
        monthlyWage:
          description: |
            🇩🇪 Monatslohn (UVG-Basis). Zwingend wenn `kindOfWagePayment = monthly`
            🇬🇧 FIXME
          type: number
          multipleOf: 0.01
        activityRate:
          description: |
            🇩🇪 Beschäftigungsgrad. Zwingend wenn `kindOfWagePayment = monthly`
            🇬🇧 FIXME
          type: number
          multipleOf: 0.01
          minimum: 0
          maximum: 100
        totalDays:
          description: |
            🇩🇪 Anzahl der geleisteten Arbeitstage. Zwingend wenn `kindOfWagePayment = daily`
            🇬🇧 FIXME
          type: number
          multipleOf: 0.01
        dailyWage:
          description: |
            🇩🇪 Geltender Tagesansatz (UVG-Basis). Zwingend wenn `kindOfWagePayment = daily`
            🇬🇧 FIXME
          type: number
          multipleOf: 0.01
        totalHours:
          description: |
            🇩🇪 Anzahl der geleisteten Arbeitsstunden. Zwingend wenn `kindOfWagePayment = hourly`
            🇬🇧 FIXME
          type: number
          multipleOf: 0.01
        hourlyWage:
          description: |
            🇩🇪 Geltender Stundensatz (UVG-Basis). Zwingend wenn `kindOfWagePayment = hourly`
            🇬🇧 FIXME
          type: number
          multipleOf: 0.01
        totalLessons:
          description: |
            🇩🇪 Anzahl der geleisteten Lektionen. Zwingend wenn `kindOfWagePayment = lesson`
            🇬🇧 FIXME
          type: number
          multipleOf: 0.01
        lessonWage:
          description: |
            🇩🇪 Geltender Lektionsansatz (UVG-Basis). Zwingend wenn `kindOfWagePayment = lesson`
            🇬🇧 FIXME
          type: number
          multipleOf: 0.01
        missionplace:
          description: |
            🇩🇪 Einsatzort
            🇬🇧 Mission place
          type: object
          properties:
            description:
              description: |
                🇩🇪 Beschreibung des Einsatzortes
                🇬🇧 FIXME
              type: string
            zip:
              description: |
                🇩🇪 Postleitzahl des Einsatzortes
                🇬🇧 FIXME
              type: string
            contact:
              description: |
                🇩🇪 Kontaktperson am Einsatzort
                🇬🇧 FIXME
              type: object
              properties:
                firstName:
                  description: |
                    🇩🇪 Vorname
                    🇬🇧 First name
                  type: string
                lastName:
                  description: |
                    🇩🇪 Nachname
                    🇬🇧 Last name
                  type: string
                email:
                  description: |
                    🇩🇪 E-Mail
                    🇬🇧 E-Mail
                  type: string
                phoneNumber:
                  description: |
                    🇩🇪 Telefon-Nummer
                    🇬🇧 Phone number
                  type: string
                mobileNumber:
                  description: |
                    🇩🇪 Mobiltelefon-Nummer
                    🇬🇧 Mobilephone number
                  type: string
        temporaryWorkAgencyRegionNumber:
          description: |
            🇩🇪 Nummer der zuständigen Region beim Personalverleiher, welche den Einsatz vermittelt bzw. verkauft hat.
            🇬🇧 FIXME.
          $ref: "#/components/schemas/TemporaryWorkAgencyRegionNumber"
        temporaryWorkAgencyBranchNumber:
          description: |
            🇩🇪 Nummer der zuständigen Filiale beim Personalverleiher, welche den Einsatz vermittelt bzw. verkauft hat.
            🇬🇧 FIXME.
          $ref: "#/components/schemas/TemporaryWorkAgencyBranchNumber"
        temporaryWorkAgencyTeamNumber:
          description: |
            🇩🇪 Nummer des zuständigen Teams beim Personalverleiher, welches den Einsatz vermittelt bzw. verkauft hat.
            🇬🇧 FIXME.
          $ref: "#/components/schemas/TemporaryWorkAgencyTeamNumber"
        temporaryWorkAgencyConsultantNumber:
          description: |
            🇩🇪 Nummer der zuständigen Person beim Personalverleiher, welche den Einsatz vermittelt bzw. verkauft hat.
            🇬🇧 FIXME.
          $ref: "#/components/schemas/TemporaryWorkAgencyConsultantNumber"

      required:
        - missionNumber
        - employeeNumber
        - missionCompanyNumber
        - periodFrom
        - periodUntil
        - iscoOccupationTypeId
        - kindOfWagePayment

    MissionCompany:
