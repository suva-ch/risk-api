openapi: 3.1.0
info:
  version: 0.1.0
  title: Lohnmeldung API
  description: |
    🇩🇪 Beschreibt die gegenüber einem ERP angebotenen Schnittstellen auf Seite Suva für die Lohn- und Einsatzmeldung.
    🇬🇧 Describes the interfaces offered to an ERP system by Suva for salary and mission declaration.
  license:
    name: Apache License 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://apitest.suva.ch/salary-declaration
    description: Staging server
tags:
  - name: Leased Employees
  - name: Permanent Employees
  - name: Mission Companies
  - name: Missions
  - name: Salary Declarations
  - name: Temporary Work Agency Branches
  - name: Temporary Work Agency Regions
  - name: Temporary Work Agency Teams
  - name: Temporary Work Agency Consultants
  - name: UVG ISCO Salaries

paths:
  /v1/salary-declarations:
    parameters:
      - $ref: "#/components/parameters/X-Client-Vendor"
      - $ref: "#/components/parameters/X-Client-Name"
      - $ref: "#/components/parameters/X-Client-Version"

    get:
      description: |
        🇩🇪 Gibt eine Liste von Lohnmeldungen zurück.

        🇬🇧 Returns a list of salary declarations.
      tags:
        - Salary Declarations
      security:
        - ApiKeyAuth: []
      operationId: getSalaryDeclarations
      responses:
        "200":
          description: |
            🇩🇪 Eine Liste mit Lohnmeldungen.

            🇬🇧 A list of salary declarations.
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/SalaryDeclaration"
        "401":
          $ref: "#/components/responses/NotAuthenticatedError"

    post:
      description: |
        🇩🇪 Erstellt eine Lohnmeldung.

        🇬🇧 Creates a salary declaration.
      tags:
        - Salary Declarations
      security:
        - ApiKeyAuth: []
      operationId: saveSalaryDeclaration
      requestBody:
        $ref: "#/components/requestBodies/SaveSalaryDeclaration"
      responses:
        "201":
          description: |
            🇩🇪 Lohnmeldung erstellt.

            🇬🇧 Salary declaration created.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SalaryDeclaration"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/NotAuthenticatedError"
        "422":
          $ref: "#/components/responses/UnprocessableContentError"

  /v1/salary-declarations/{salaryDeclarationId}:
    parameters:
      - $ref: "#/components/parameters/X-Client-Vendor"
      - $ref: "#/components/parameters/X-Client-Name"
      - $ref: "#/components/parameters/X-Client-Version"
      - $ref: "#/components/parameters/SalaryDeclarationId"

    get:
      description: |
        🇩🇪 Gibt die Details einer bestehenden Lohnmeldung zurück.

        🇬🇧 Returns the details of an existing salary declaration.
      tags:
        - Salary Declarations
      security:
        - ApiKeyAuth: []
      operationId: getSalaryDeclaration
      responses:
        "200":
          description: |
            🇩🇪 Details einer Lohnmeldung.

            🇬🇧 Details of a salary declaration.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SalaryDeclaration"
        "401":
          $ref: "#/components/responses/NotAuthenticatedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      description: |
        🇩🇪 Aktualisiert eine Lohnmeldung.

        🇬🇧 Updates a salary declaration.
      tags:
        - Salary Declarations
      security:
        - ApiKeyAuth: [ ]
      operationId: updateSalaryDeclaration
      requestBody:
        $ref: "#/components/requestBodies/UpdateSalaryDeclaration"
      responses:
        "204":
          description: |
            🇩🇪 Lohnmeldung aktualisiert.

            🇬🇧 Salary declaration updated.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/NotAuthenticatedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableContentError"

    patch:
      description: |
        🇩🇪 Aktualisiert den Status einer Lohnmeldung.

        🇬🇧 Update the state of a salary declaration.
      tags:
        - Salary Declarations
      security:
        - ApiKeyAuth: []
      operationId: patchSalaryDeclaration
      requestBody:
        $ref: "#/components/requestBodies/PatchSalaryDeclaration"
      responses:
        "200":
          description: |
            🇩🇪 Lohnmeldung aktualisiert.

            🇬🇧 Salary declaration updated.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SalaryDeclaration"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/NotAuthenticatedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/UnprocessableContentError"

